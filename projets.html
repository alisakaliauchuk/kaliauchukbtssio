<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Portfolio - Alisa Kaliauchuk</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h2>Alisa Kaliauchuk</h2>
    <p>Étudiant BTS SIO - Option SLAM</p>
</header>

<nav>
    <a href="index.html">Accueil</a>
    <a href="formations.html">Formations</a>
    <a href="stages.html">Stages</a>
    <a href="competences.html">Compétences</a>
    <a href="projets.html">Projets</a>

<section class="projects-section">
    <div class="projects-grid" id="projets-grid">
    </div>
</section>

<footer>
    <p>©2026 - Alisa Kaliauchuk | Portfolio BTS SIO</p>
</footer>

<script>
const projets = [
    {
        tag: "Application Web",
        titre: "SERIE Projet",
        description: "Décris ton projet ici : ce qu'il fait, pourquoi tu l'as créé, et ce que tu as appris.",
        technologies: ["HTML", "CSS", "JavaScript"],
        zip: "https://github.com/alisakaliauchuk/kaliauchukbtssio/raw/main/archives/SERIE_projet.zip",
        github: "https://github.com/alisakaliauchuk/kaliauchukbtssio"
    },
];

const grid = document.getElementById('projets-grid');

projets.forEach(p => {
    const badges = p.technologies.map(t => `<span class="tech-badge">${t}</span>`).join('');
    grid.innerHTML += `
        <div class="project-card">
            <div class="card-banner"></div>
            <div class="card-body">
                <span class="card-tag">${p.tag}</span>
                <h3 class="card-title">${p.titre}</h3>
                <p class="card-desc">${p.description}</p>
                <div class="card-tech">${badges}</div>
            </div>
            <div class="card-footer">
                <a class="btn-download" href="${p.zip}" download>
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 4v12m0 0l-4-4m4 4l4-4"/>
                    </svg>
                    Télécharger
                </a>
                <a class="btn-github" href="${p.github}" target="_blank" rel="noopener">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.014-1.703-2.782.604-3.369-1.341-3.369-1.341-.454-1.155-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
                    </svg>
                    GitHub
                </a>
            </div>
        </div>`;
});

const placeholders = Math.max(0, 3 - projets.length);
for (let i = 0; i < placeholders; i++) {
    grid.innerHTML += `
        <div class="project-card placeholder">
            <div class="placeholder-inner">
                <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                </svg>
                <p>Prochain projet<br>à venir…</p>
            </div>
        </div>`;
}
</script>

</body>
</html>
