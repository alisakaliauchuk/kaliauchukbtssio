<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Portfolio - Alisa Kaliauchuk</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="auth.js"></script>
</head>

<body>

<header>
    <h2>Alisa Kaliauchuk</h2>
    <p>Étudiant BTS SIO - Option SLAM</p>
</header>

<nav>
    <a href="index.html">Accueil</a>
    <a href="formations.html">Formations</a>
    <a href="stages.html">Stages</a>
    <a href="competences.html">Compétences</a>
    <a href="projets.html">Projets</a>
</nav>

<section class="projects-section">
    <div class="projects-grid" id="projets-grid">
    </div>
</section>

<footer>
    <p>©2026 - Alisa Kaliauchuk | Portfolio BTS SIO</p>
</footer>

<script>
const projets = [
    {
        tag: "Application Web",
        titre: "SERIE Projet",
        description: "...",
        technologies: ["PHP", "CSS", "SQL"],
        zip: "https://github.com/alisakaliauchuk/kaliauchukbtssio/raw/main/archives/SERIE_projet.zip"
    },
];

const grid = document.getElementById('projets-grid');

projets.forEach(p => {
    const badges = p.technologies.map(t => `<span class="tech-badge">${t}</span>`).join('');
    grid.innerHTML += `
        <div class="project-card">
            <div class="card-banner"></div>
            <div class="card-body">
                <span class="card-tag">${p.tag}</span>
                <h3 class="card-title">${p.titre}</h3>
                <p class="card-desc">${p.description}</p>
                <div class="card-tech">${badges}</div>
            </div>
            <div class="card-footer">
                <a class="btn-download" href="${p.zip}" download>
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 4v12m0 0l-4-4m4 4l4-4"/>
                    </svg>
                    Télécharger
                </a>
            </div>
        </div>`;
});

const placeholders = Math.max(0, 3 - projets.length);
for (let i = 0; i < placeholders; i++) {
    grid.innerHTML += `
        <div class="project-card placeholder">
            <div class="placeholder-inner">
                <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                </svg>
                <p>Prochain projet<br>à venir…</p>
            </div>
        </div>`;
}
</script>

</body>
</html>
